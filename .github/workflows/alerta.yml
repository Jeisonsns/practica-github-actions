name: Notificacion NTFY

on:
  push:
    branches:
      - main

jobs:
  enviar-alerta:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar notificacion
        run: |
          curl -H "Title: Nuevo Push" \
               -H "Priority: default" \
               -d "Se ha realizado un push a la rama main" \
               https://ntfy.sh/devops-itla
